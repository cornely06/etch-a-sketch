<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Etch-A-Sketch</title>
        <link rel="stylesheet" href="style-desktop.css">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="etch-a-sketch">
            <div id="title">Etch-A-Sketch</div>
            <div id="container">
            </div>
                <div id="buttons">
                <button id="clear">Clear</button>
                <button id="black" class="colorButton">Black</button>
                <button id="random" class="colorButton">Random</button>
                <button id="rainbow" class="colorButton">Rainbow</button>
                <button id="eraser" class="colorButton">Eraser</button>
                <button id="color-picker" class="colorButton">Pick: <input type="color"></button>
                <div id="slider-container">
                <button id="resize"></button>
                <input type="range" min="1" max="50" value="16" id="myRange">
                </div>
            </div>
        </div>
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
