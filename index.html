<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Etch-A-Sketch</title>
        <link rel="stylesheet" href="style-desktop.css">
    </head>
    <body>
        <div id="container">
        </div>
        <div>
            <button id="reset">Reset</button>
            <button id="black">Black</button>
            <button id="grey-scale">Grey Scale</button>
            <button id="rainbow">Rainbow</button>
            <button id="eraser">Eraser</button>
        </div>
        <script>
            const container = document.getElementById("container");
            const reset = document.getElementById("reset");
            const black = document.getElementById("black");
            const grey = document.getElementById("grey-scale");
            const rainbow = document.getElementById("rainbow");
            let hoverStyle = "black";
            function createCell(cellSize) {
                const cell = document.createElement("div");
                cell.style.border = "1px solid black";
                cell.style.borderRadius = "2px";
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.addEventListener("mouseover", () => cell.className = hoverStyle);
                return cell;
            }
            function createGrid(gridSize) {
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        container.appendChild(createCell(container.clientWidth / gridSize));
                    }
                }
            }
            reset.addEventListener("click", resetGrid);
            function resetGrid() {
                while(container.firstChild) {
                    container.removeChild(container.lastChild);
                }
                let number = parseInt(prompt("Enter a side length for the square grid (1-50)", ""));
                while (number < 1 || number > 50 || isNaN(number)) {
                    number = parseInt(prompt("Please enter a valid number between 1 and 50", ""));
                }
                createGrid(number);
            }
            function changeStyle(style) {
                hoverStyle = style;
            }
            black.addEventListener("click", () => changeStyle("black"));
            grey.addEventListener("click", () => changeStyle("grey"));
            rainbow.addEventListener("click", () => changeStyle("rainbow"));
            eraser.addEventListener("click", () => changeStyle("eraser"));
            createGrid(16);
        </script>
    </body>
</html>
