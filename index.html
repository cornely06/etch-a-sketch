<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Etch-A-Sketch</title>
        <link rel="stylesheet" href="style-desktop.css">
    </head>
    <body>
        <div id="container">
        </div>
        <div>
            <button id="reset">Reset</button>
        </div>
        <script>
            const container = document.getElementById("container");
            const reset = document.getElementById("reset");
            let black = "default";
            function createCell(cellSize) {
                const cell = document.createElement("div");
                cell.style.width = `${cellSize}px`;
                cell.style.height = `${cellSize}px`;
                cell.classList.add("cells");
                cell.addEventListener("mouseover", () => cell.classList.add(black));
                return cell;
            }
            function createGrid(gridSize) {
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        container.appendChild(createCell(container.clientWidth / gridSize));
                    }
                }
            }
            reset.addEventListener("click", resetGrid);
            function resetGrid() {
                while(container.firstChild) {
                    container.removeChild(container.lastChild);
                }
                let number = parseInt(prompt("Enter a side length for the square grid (1-50)", ""));
                while (number < 1 || number > 50 || isNaN(number)) {
                    number = parseInt(prompt("Please enter a valid number between 1 and 50", ""));
                }
                createGrid(number);
            }
            createGrid(16);
        </script>
    </body>
</html>
